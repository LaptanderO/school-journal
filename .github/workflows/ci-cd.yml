name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_BACKEND: school-journal-backend
  IMAGE_FRONTEND: school-journal-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: school_user
          POSTGRES_PASSWORD: school_pass
          POSTGRES_DB: school_journal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U school_user; do sleep 1; done

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: school_journal
          DB_USER: school_user
          DB_PASSWORD: school_pass
        run: node -e "
          const { sequelize } = require('./src/config/database');
          (async () => {
            await sequelize.sync({ force: true });
            console.log('Database synced');
            process.exit(0);
          })();
        "

      - name: Run tests (если есть)
        run: echo "No tests yet" || true

  build-and-push:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            .

      - name: Build Frontend Image
        run: |
          docker build \
            -f docker/Dockerfile.frontend \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
            .

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "✅ Backend: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest"
          echo "✅ Frontend: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest"