name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_BACKEND: school-journal-backend
  IMAGE_FRONTEND: school-journal-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: school_user
          POSTGRES_PASSWORD: school_pass
          POSTGRES_DB: school_journal
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync test database
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: school_journal
          DB_USER: school_user
          DB_PASSWORD: school_pass
        run: node scripts/sync-db.js

      - name: Run tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: school_journal
          DB_USER: school_user
          DB_PASSWORD: school_pass
        run: npm test

  build-and-push:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -f docker/Dockerfile.backend -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest .

      - name: Build Frontend Image
        run: docker build -f docker/Dockerfile.frontend -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest .

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest
