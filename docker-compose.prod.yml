services:
  postgres:
    image: postgres:15-alpine
    container_name: school-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-school_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-school_prod_pass_2024}
      POSTGRES_DB: ${DB_NAME:-school_journal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-school_user} -d ${DB_NAME:-school_journal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: school-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-school_journal}
      DB_USER: ${DB_USER:-school_user}
      DB_PASSWORD: ${DB_PASSWORD:-school_prod_pass_2024}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - school-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: school-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - school-network

  prometheus:
    image: prom/prometheus:latest
    container_name: school-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - school-network

  grafana:
    image: grafana/grafana:latest
    container_name: school-grafana-prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - school-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  school-network:
    driver: bridge