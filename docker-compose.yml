version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=school_journal
      - DB_USER=school_user
      - DB_PASSWORD=school_pass
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: school_user
      POSTGRES_PASSWORD: school_pass
      POSTGRES_DB: school_journal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_user -d school_journal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school-network

volumes:
  postgres_data:

networks:
  school-network:
    driver: bridge